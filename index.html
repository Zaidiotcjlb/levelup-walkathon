<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Walk-A-Thon Countdown</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <img src="banner.jpg" class="banner" alt="Level Up">
  <h2>COUNTDOWN TO THE WALK-A-THON</h2>
  <div id="countdown">
    <div><span id="days">0</span><small>Days</small></div>
    <div><span id="hours">0</span><small>Hours</small></div>
    <div><span id="minutes">0</span><small>Minutes</small></div>
    <div><span id="seconds">0</span><small>Seconds</small></div>
  </div>
  <div class="card">
    <h1>LEVEL UP WALK-A-THON</h1>
    <p><strong>Saturday, September 26, 2026</strong></p>
    <p>Pike High School</p>
    <p>Check-In: 9:00 A.M. | Walk: 10:00 A.M.</p>
    <p>Proceeds benefit family childcare providers in Marion County.</p>
    <p class="small">Updates automatically using Indianapolis time.</p>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
